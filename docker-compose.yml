services:
  postgres_db:
    image: postgres:16-alpine
    container_name: resilientdb_postgres
    environment:
      - POSTGRES_DB=resilientdb
      - POSTGRES_USER=resilient_user
      - POSTGRES_PASSWORD=resilient_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: resilientdb_app
    ports:
      - "8080:8080"
    depends_on:
      - postgres_db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres_db:5432/resilientdb
    volumes:
      - ./backups:/app/backups

volumes:
  pgdata:
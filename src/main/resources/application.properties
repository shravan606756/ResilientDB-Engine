# Server Configuration
server.port=8080
spring.application.name=resilientdb-engine

# ===============================
# DATABASE CONNECTION (PostgreSQL)
# ===============================
# 'postgres_db' is the name of the service in docker-compose
spring.datasource.url=jdbc:postgresql://postgres_db:5432/resilientdb
spring.datasource.username=resilient_user
spring.datasource.password=resilient_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE SETTINGS
# ===============================
# Automatically creates/updates tables in your new Postgres container
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ===============================
# TIMEZONE & REGIONAL SETTINGS
# ===============================
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'

# ===============================
# STORAGE SETTINGS
# ===============================
# This maps to the folder created in your Dockerfile
app.backup.dir=backups
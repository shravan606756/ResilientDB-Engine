# Server Configuration
server.port=8080
spring.application.name=resilientdb-engine

# ===============================
# DATABASE CONNECTION (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://${RDS_ENDPOINT:postgres_db}:5432/${RDS_DB_NAME:resilientdb}
spring.datasource.username=${RDS_USERNAME:resilient_user}
spring.datasource.password=${RDS_PASSWORD:resilient_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE SETTINGS
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ===============================
# TIMEZONE & REGIONAL SETTINGS
# ===============================
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'

# ===============================
# STORAGE SETTINGS
# ===============================
# Sticking with proven containerized path
app.backup.dir=backups